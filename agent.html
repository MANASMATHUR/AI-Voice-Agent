<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Agent</title>
  <meta name="description" content="Talk or type in English, Hindi, or Marathi. The agent remembers the conversation and speaks replies." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="gradient-bar" aria-hidden="true"></div>

  <div class="page-agent">
    <a href="index.html" class="back">← Back</a>
    <h2>Voice Agent</h2>
    <p class="tagline">Talk or type in English, Hindi, or Marathi. Replies are spoken; the agent remembers context.</p>

    <div class="lang-toggle mode-row" role="group" aria-label="Interaction mode" style="margin-bottom:0.5rem;">
      <button type="button" class="lang-btn mode-tab active" disabled aria-current="page">Text Chat</button>
      <a href="agent-vapi.html" class="lang-btn mode-tab" style="text-decoration:none;display:inline-flex;align-items:center;">Voice Call</a>
    </div>

    <div id="api-config-banner" class="rate-limit-warning" style="display:none;" role="alert"></div>

    <div class="lang-toggle" role="group" aria-label="Conversation language" id="language-picker">
      <button type="button" class="lang-btn lang-pick-btn active" data-lang="en" aria-pressed="true">English</button>
      <button type="button" class="lang-btn lang-pick-btn" data-lang="hi" aria-pressed="false">हिंदी</button>
      <button type="button" class="lang-btn lang-pick-btn" data-lang="mr" aria-pressed="false">मराठी</button>
    </div>

    <div class="agent-card">
      <h3>Conversation</h3>
      <div id="conversation" class="conversation" role="log" aria-live="polite" aria-label="Chat messages"></div>
      <div class="input-row">
        <input type="text" id="user-input" placeholder="Type or use voice…" aria-label="Your message" autocomplete="off" />
        <button type="button" class="voice-btn" id="voice-btn" title="Hold to speak" aria-pressed="false">🎤 Voice</button>
        <button type="button" class="btn btn-primary" id="send-btn">Send</button>
      </div>
      <p id="status" class="status" aria-live="polite" aria-atomic="true"></p>
    </div>
  </div>

  <script src="js/agent.js"></script>
</body>
</html>
